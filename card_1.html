<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Page</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="card.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    #payment-section {
      display: none;
      background-color: #f8f9fa;
      padding: 50px;
      width: 100vw;
      height: 100vh;
      margin: 0;
      overflow-y: auto;
    }
    .form-control, .form-select {
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
    }
    .btn-primary {
      border-radius: 8px;
      font-size: 20px;
      padding: 12px;
    }
  </style>
</head>
<body>
    <div class="header">
        <div class="menu-button" onclick="toggleSidebar()">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div class="logo">
            <img src="https://github.com/muhammadsufiyan-git/E-Project/blob/main/logo.png?raw=true" alt="Logo">
        </div>
        <div class="icons">
            <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png" alt="User">
            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077035.png" alt="Heart">
            <img src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png" alt="Cart">
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleSidebar()">✖</button>
        <a href="index.html" class="menu-item">HOME</a>
        <a href="#card" class="menu-item">SHOP</a>
        <a href="slider.html" class="menu-item">FEATURED</a>
        <a href="#pages" class="menu-item">PAGES</a>
        <a href="#footer" class="menu-item">BLOGS</a>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  <!-- Product Section -->
  <div id="product-section" class="product-container">
    <div class="product-image">
      <img id="product-img" src="https://klasie-store-demo.myshopify.com/cdn/shop/products/product60.jpg?v=1704550117" alt="Product Image">
    </div>
    <div class="product-details">
      <h1 id="product-title" class="product-title">Design Glasses</h1>
      <p id="product-price" class="price"><del>$180.00 USD</del> $89.00 USD</p>
      <p class="stock-status">🔥 HURRY! ONLY 10 LEFT IN STOCK</p>
      <p class="product-description">
        Modern and stylish eye glasses designed to give you a premium look. Lightweight and durable for all-day comfort.
      </p>
      <div class="buttons">
        <button class="add-to-cart">Add to Cart</button>
        <button class="buy-now" onclick="showPaymentSection('https://klasie-store-demo.myshopify.com/cdn/shop/products/product60.jpg?v=1704550117', 'Design Glasses', '$89.00 USD')">
          Buy Now
        </button>
      </div>
    </div>
  </div>
  
  <!-- Payment Section (Full Screen) -->
  <div id="payment-section">
    <h3 class="mb-4 text-center">Checkout</h3>
    <div id="alert-message"></div>
    <form id="checkout-form">
      <h5 class="mb-3">Delivery Details</h5>
      <div class="mb-3">
        <label for="first-name" class="form-label">First Name</label>
        <input type="text" class="form-control" id="first-name" placeholder="John" required>
      </div>
      <div class="mb-3">
        <label for="last-name" class="form-label">Last Name</label>
        <input type="text" class="form-control" id="last-name" placeholder="Doe" required>
      </div>
      <div class="mb-3">
        <label for="address" class="form-label">Address</label>
        <input type="text" class="form-control" id="address" placeholder="123 Main St" required>
      </div>
      <h5 class="mb-3">Payment Details</h5>
      <div class="mb-3">
        <label for="payment-method" class="form-label">Select Payment Method</label>
        <select class="form-select" id="payment-method" required>
          <option value="card">Credit/Debit Card</option>
          <option value="paypal">PayPal</option>
        </select>
      </div>
      <div id="card-details">
        <div class="mb-3">
          <label for="card-number" class="form-label">Card Number</label>
          <input type="text" class="form-control" id="card-number" placeholder="1234 5678 9012 3456" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-3">Pay Now</button>
    </form>
  </div>
  
  <script>
    function showPaymentSection(image, name, price) {
      let product = { image: image, name: name, price: price };
      localStorage.setItem("selectedProduct", JSON.stringify(product));
      
      document.getElementById("product-section").style.display = "none";
      document.getElementById("payment-section").style.display = "block";
      
      
    }
    
    function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
        
    $(document).ready(function () {
      $('#payment-method').change(function () {
        if ($(this).val() === 'paypal') {
          $('#card-details').hide();
        } else {
          $('#card-details').show();
        }
      });
      
      document.getElementById('checkout-form').addEventListener('submit', function(event) {
        event.preventDefault();
        document.getElementById('alert-message').innerHTML = '';
  
        let firstName = document.getElementById('first-name').value.trim();
        let lastName = document.getElementById('last-name').value.trim();
        let address = document.getElementById('address').value.trim();
        let paymentMethod = document.getElementById('payment-method').value;
        let cardNumber = document.getElementById('card-number').value.trim();
  
        if (!firstName || !lastName || !address) {
          document.getElementById('alert-message').innerHTML = '<div class="alert alert-danger">Please fill in all delivery details.</div>';
          return;
        }
  
        if (paymentMethod === 'card' && !cardNumber) {
          document.getElementById('alert-message').innerHTML = '<div class="alert alert-danger">Please enter your card number.</div>';
          return;
        }
  
        document.getElementById('alert-message').innerHTML = '<div class="alert alert-success">Payment Successful!</div>';
      });
    });
  </script>
</body>
</html>
