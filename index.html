<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Spex Opening</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        /* Preloader Container */
        #preloader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #000, #111);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            perspective: 1000px;
        }

        .logo-container {
            position: relative;
            opacity: 0;
            transform-style: preserve-3d;
            animation: fadeIn 2s ease-out forwards, float 6s ease-in-out infinite;
        }

        .logo {
            width: 180px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8));
            animation: glow 2s ease-in-out infinite alternate, rotate 8s linear infinite;
        }

        /* Background Light Burst */
        .light-burst {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3), transparent 70%);
            opacity: 0;
            animation: burst 3s ease-in-out forwards;
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.7;
            animation: float 5s linear infinite;
        }

        /* Gradient Overlay */
        .gradient-overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(255, 0, 150, 0.2), rgba(0, 200, 255, 0.2));
            opacity: 0;
            animation: gradientFade 4s ease-in-out forwards;
        }

        /* Blur Effect */
        .blur {
            position: fixed;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(40px);
            opacity: 1;
            animation: blurOut 2s ease-out forwards;
            animation-delay: 3.5s;
        }

        /* Blackout Screen */
        #blackout {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 8s; 
        }

        /* Animations */
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        @keyframes glow {
            0% { filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8)); }
            100% { filter: drop-shadow(0 0 30px rgba(255, 255, 255, 1)); }
        }

        @keyframes burst {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1); }
        }

        @keyframes rotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        @keyframes gradientFade {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes blurOut {
            100% { opacity: 0; backdrop-filter: blur(0px); }
        }

        @keyframes slideIn {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

    <!-- Preloader (Opening) -->
    <div id="preloader">
        <div class="light-burst"></div>
        <div class="gradient-overlay"></div>
        <div class="particles"></div>
        <div class="logo-container">
            <img src="https://github.com/muhammadsufiyan-git/E-Project/blob/main/logo.png?raw=true" alt="Logo" class="logo">
        </div>
        <div class="blur"></div>
    </div>

    <!-- Blackout Screen -->
    <div id="blackout"></div>

    <script>
        function createParticles() {
            const particleContainer = document.querySelector('.particles');
            for (let i = 0; i < 150; i++) {
                let particle = document.createElement('div');
                particle.classList.add('particle');
                let size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.animationDuration = `${Math.random() * 4 + 3}s`;
                particle.style.animationDelay = `${Math.random() * 2}s`;
                particleContainer.appendChild(particle);
            }
        }
        createParticles();

        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(() => {
                document.getElementById("preloader").style.animation = "fadeOut 1s forwards";

                document.getElementById("blackout").style.opacity = 1;

                setTimeout(() => {
                    window.location.href = "Home.html";
                }, 1500);
            }, 8000);
        });
    </script>

</body>
</html>
