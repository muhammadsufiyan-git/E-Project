<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Rated Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .menu-button {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 21px;
            cursor: pointer;
        }

        .menu-button .bar {
            width: 100%;
            height: 4px;
            background-color: #333;
            border-radius: 2px;
        }

        .logo img {
            width: 80px;
        }

        .icons {
            display: flex;
            gap: 15px;
        }

        .icons img {
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background-color: #333;
            color: white;
            transition: left 0.3s ease;
            z-index: 999;
            padding-top: 60px;
        }

        .sidebar.open {
            left: 0;
        }

        .menu-item {
            display: block;
            padding: 15px;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid #444;
        }

        .content {
            flex: 1;
            padding-top: 100px;
            padding-bottom: 50px;
        }

        .swiper-container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }

        .swiper-slide {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.2s;
            text-decoration: none;
        }

        .swiper-slide a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .swiper-slide:hover {
            transform: scale(1.05);
        }

        .swiper-slide img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .footer {
            background: #333;
            color: white;
            padding: 20px;
            text-align: center;
            width: 100%;
            position: relative;
            bottom: 0;
        }

        /* Responsive Styles */
        @media (max-width: 1024px) {
            .swiper-container {
                width: 85%;
            }

            .logo img {
                width: 70px;
            }

            .icons img {
                width: 28px;
                height: 28px;
            }
        }

        @media (max-width: 768px) {
            .swiper-container {
                width: 95%;
            }

            .icons img {
                width: 25px;
                height: 25px;
            }

            .menu-button {
                width: 25px;
                height: 18px;
            }

            .header {
                padding: 8px 15px;
            }
        }

        @media (max-width: 480px) {
            .swiper-container {
                width: 100%;
            }

            .swiper-slide {
                min-width: 200px;
                padding: 10px;
            }

            .icons img {
                width: 22px;
                height: 22px;
            }

            .header {
                flex-direction: row;
                padding: 8px;
            }

            .menu-button {
                width: 20px;
                height: 15px;
            }

            .sidebar {
                width: 200px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="menu-button" onclick="toggleSidebar()">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div class="logo">
            <img src="https://github.com/muhammadsufiyan-git/E-Project/blob/main/logo.png?raw=true" alt="Logo">
        </div>
        <div class="icons">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ-aKJ9AbwvP0MGcEyOeOw_4XGgMktjq1WMsA&s"
                alt="User">
            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077035.png" alt="Wishlist">
            <img src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png" alt="Cart">
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleSidebar()">✖</button>
        <a href="index.html" class="menu-item">HOME</a>
        <a href="#" class="menu-item">SHOP</a>
        <a href="slider.html" class="menu-item">FEATURED</a>
        <a href="#" class="menu-item">PAGES</a>
        <a href="#" class="menu-item">BLOGS</a>
    </div>

    <div class="content">
        <h2>Top Rated Products</h2>

        <div class="swiper-container">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <a href="card_1.html">
                        <img src="https://klasie-store-demo.myshopify.com/cdn/shop/products/product60.jpg?v=1704550117"
                            alt="Product 1">
                        <h3>Design Glasses</h3>
                        <p>⭐⭐⭐⭐⭐</p>
                    </a>
                </div>
                <div class="swiper-slide">
                    <a href="card_6.html">
                        <img src="https://klasie-store-demo.myshopify.com/cdn/shop/products/product31.jpg?v=1704550061"
                            alt="Product 2">
                        <h3>Clubround Round Sunglasses</h3>
                        <p>⭐⭐⭐⭐⭐</p>
                    </a>
                </div>
                <div class="swiper-slide">
                    <a href="card_11.html">
                        <img src="https://klasie-store-demo.myshopify.com/cdn/shop/products/product13.jpg?v=1704550029"
                            alt="Product 2">
                        <h3>Gradient Aviator Sunglasses</h3>
                        <p>⭐⭐⭐⭐⭐</p>
                    </a>
                </div>
                <div class="swiper-slide">
                    <a href="card_5.html">
                        <img src="https://klasie-store-demo.myshopify.com/cdn/shop/products/product39.jpg?v=1704550075"
                            alt="Product 2">
                        <h3>Octagonal Flat Lens Sunglasses</h3>
                        <p>⭐⭐⭐⭐⭐</p>
                    </a>
                </div>
            </div>
        </div>

    </div>

    <div class="footer">
        <p>&copy; 2025 Your Website. All Rights Reserved.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        var swiper = new Swiper('.swiper-container', {
            slidesPerView: 3,
            spaceBetween: 20,
            loop: true,
            autoplay: { delay: 2000, disableOnInteraction: false },
            breakpoints: {
                1024: { slidesPerView: 3 },
                768: { slidesPerView: 2 },
                480: { slidesPerView: 1 }
            }
        });
    </script>
</body>

</html>
