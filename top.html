<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Rated Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .header .menu-button {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 25px;
            height: 21px;
            cursor: pointer;
        }
        .header .menu-button .bar {
            width: 100%;
            height: 4px;
            background-color: #333;
            border-radius: 2px;
        }
        .header .logo img {
            width: 100px;
        }
        .header .icons img {
            width: 35px;
            height: 35px;
            margin: 0 15px;
            cursor: pointer;
        }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: -250px; 
            width: 250px;
            height: 100%;
            background-color: #333;
            color: white;
            transition: left 0.3s ease;
            z-index: 999;
        }
        .sidebar.open {
            left: 0;
        }
        .sidebar .menu-title {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
        }
        .sidebar .menu-item {
            padding: 15px;
            color: white;
            text-decoration: none;
            display: block;
            border-bottom: 1px solid #444;
        }
        .overlay.active {
            display: block;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 998;
        }

        /* Swiper */
        .swiper-container {
            width: 90%;
            margin: auto;
            padding: 20px;
            margin-top: 80px; 
        }
        .swiper-wrapper {
            display: flex;
        }
        .swiper-slide {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .swiper-slide:hover {
            transform: scale(1.05);
        }
        .swiper-slide img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .footer {
            background: #333;
            color: white;
            padding: 20px;
            margin-top: 200px;
        }

        @media (max-width: 1024px) {
            .swiper-container {
                width: 80%;
            }
            .header .logo img {
                width: 80px;
            }
            .header .icons img {
                width: 30px;
                height: 30px;
            }
        }

        @media (max-width: 768px) {
            .swiper-container {
                width: 95%;
            }
            .swiper-slide {
                min-width: 250px;
            }
            .header .logo img {
                width: 90px;
            }
            .header .icons img {
                width: 30px;
                height: 30px;
            }
        }

        @media (max-width: 480px) {
            .swiper-container {
                width: 100%;
            }
            .swiper-slide {
                min-width: 200px;
                padding: 10px;
            }
            .header .logo img {
                width: 70px;
            }
            .header .icons img {
                width: 25px;
                height: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-button" onclick="toggleSidebar()">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div class="logo">
            <img src="https://github.com/muhammadsufiyan-git/E-Project/blob/main/logo.png?raw=true" alt="Logo">
        </div>
        <div class="search-container">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ0mzeKiQL5ZUdLgk-eAcm0azd9JZ28E27X0w&s" alt="Search" class="search-icon" onclick="toggleSearch()">
            <div class="search-bar" id="searchBar">
                <input type="text" class="search-input" placeholder="Search...">
                <span class="close-btn" onclick="toggleSearch()">X</span>
            </div>
        </div>
        
            <a href="one.html">
                <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png" alt="User" width="40" height="40" style="cursor: pointer;">
            </a>
            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077035.png" alt="Heart">
            <img src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png" alt="Cart">
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleSidebar()">✖</button>
        <div class="menu-title">Menu</div>
        <a href="index.html" class="menu-item">HOME <span>&#8250;</span></a>
        <a href="#" class="menu-item">SHOP <span>&#8250;</span></a>
        <a href="slider.html" class="menu-item">FEATURED <span>&#8250;</span></a>
        <a href="#" class="menu-item">PAGES <span>&#8250;</span></a>
        <a href="#" class="menu-item">BLOGS <span>&#8250;</span></a>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <h2>Top Rated Products</h2>

    <div class="swiper-container">
        <div class="swiper-wrapper">
            <div class="swiper-slide" onclick="openProductPage('card_1.html')">
                <img src="https://klasie-store-demo.myshopify.com/cdn/shop/products/product60.jpg?v=1704550117" alt="Product 1">
                <h3>Oval Flat Lens Sunglasses</h3>
                <p>⭐⭐⭐⭐⭐</p>
            </div>
            <div class="swiper-slide" onclick="openProductPage('card_4.html')">
                <img src="https://klasie-store-demo.myshopify.com/cdn/shop/products/product39.jpg?v=1704550075" alt="Product 2">
                <h3>Octagonal Flat Lens Sunglasses</h3>
                <p>⭐⭐⭐⭐⭐</p>
            </div>
            <div class="swiper-slide" onclick="openProductPage('card_5.html')">
                <img src="https://klasie-store-demo.myshopify.com/cdn/shop/products/product31.jpg?v=1704550061" alt="Product 3">
                <h3>Clubround Round Sunglasses</h3>
                <p>⭐⭐⭐⭐⭐</p>
            </div>
            <div class="swiper-slide" onclick="openProductPage('card_11.html')">
                <img src="https://klasie-store-demo.myshopify.com/cdn/shop/products/product13.jpg?v=1704550029" alt="Product 4">
                <h3>Gradient Aviator Sunglasses</h3>
                <p>⭐⭐⭐⭐⭐</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2025 Your Website. All Rights Reserved.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
    <script>
        function openProductPage(url) {
            window.location.href = url;
        }

        var swiper = new Swiper('.swiper-container', {
            slidesPerView: 3,
            spaceBetween: 20,
            loop: true,
            autoplay: {
                delay: 2000,
                disableOnInteraction: false,
            },
            breakpoints: {
                768: {
                    slidesPerView: 2,
                },
                480: {
                    slidesPerView: 1,
                }
            }
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
