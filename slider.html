<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non-Stop Scrolling Slider</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="card.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
            background-color: #f4f4f4;
        }

        .header {
            margin-bottom: 100px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #fff;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .swiper-container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .swiper-wrapper {
            display: flex;
            transition-timing-function: linear !important;
        }

        .swiper-slide {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-width: 300px;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card img {
            width: 200px;
            height: 200px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        footer {
            margin-top: 0px;
            padding: 20px;
            background-color: #333;
            color: white;
            text-align: center;
        }

        @media (max-width: 768px) {
            .swiper-container {
                width: 90%;
            }

            .swiper-slide {
                min-width: 250px;
                padding: 10px;
            }

            .card img {
                width: 150px;
                height: 150px;
            }

            .header .icons img {
                width: 35px;
                height: 35px;
            }
        }

        @media (max-width: 480px) {
            .swiper-container {
                width: 100%;
            }

            .swiper-slide {
                min-width: 200px;
                padding: 5px;
            }

            .card img {
                width: 130px;
                height: 130px;
            }

            .header .icons img {
                width: 30px;
                height: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="menu-button" onclick="toggleSidebar()">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="icons">
            <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png" alt="User">
            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077035.png" alt="Heart">
            <img src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png" alt="Cart">
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleSidebar()">✖</button>
        <a href="index.html" class="menu-item">HOME</a>
        <a href="#" class="menu-item">SHOP</a>
        <a href="#" class="menu-item">FEATURED</a>
        <a href="#" class="menu-item">PAGES</a>
        <a href="#" class="menu-item">BLOGS</a>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="swiper-container">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <div class="card">
                    <img src="https://www.realmenrealstyle.com/wp-content/uploads/2023/06/Vanity-Glasses.jpg"
                        alt="Card 1">
                    <h3>BEST EYE GLASSES</h3>
                    <p>eye wear glasses.</p>
                </div>
            </div>
            <div class="swiper-slide">
                <div class="card">
                    <img src="https://www.shutterstock.com/image-photo/happy-middle-aged-professional-business-600nw-2454390621.jpg"
                        alt="Card 2">
                    <h3>MEN GLASSES</h3>
                    <p>best seller.</p>
                </div>
            </div>
            <div class="swiper-slide">
                <div class="card">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR4YDzph2J80gZhfpgUSwL0-5IW5kmb4HYO3Ft5QSL4UjmH4CH8Ia-r0qW5UXZryHzIiME&usqp=CAU"
                        alt="Card 3">
                    <h3>WEAR OF CEO</h3>
                    <p>best for formal dressing</p>
                </div>
            </div>
            <div class="swiper-slide">
                <div class="card">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSSBf0k1EmJHV104rpsnqUw7wBuIkE7UsL-1Q&s"
                        alt="Card 4">
                    <h3>SPONSER</h3>
                    <p>applying for the beautiful add.</p>
                </div>
            </div>
            <div class="swiper-slide">
                <div class="card">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcREoPVy9GwDvKFyxhDp4y7X56tA_YyA_5ai5A&s"
                        alt="Card 5">
                    <h3>EXCLUSIVE DESIGN</h3>
                    <p>best for casual dressing.</p>
                </div>
            </div>
        </div>
    </div>

    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>

    <footer class="footer">
        <p>© 2024 | ELITESPEX by ThemeOcean. Powered by E-Project.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper('.swiper-container', {
            slidesPerView: 3,
            spaceBetween: 20,
            loop: true,
            speed: 3000,
            autoplay: {
                delay: 0,
                disableOnInteraction: false,
            },
            allowTouchMove: false,
            freeMode: true,
            freeModeMomentum: false,
        });

        let slides = document.querySelectorAll('.swiper-slide');
        let wrapper = document.querySelector('.swiper-wrapper');

        slides.forEach(slide => {
            let clone = slide.cloneNode(true);
            wrapper.appendChild(clone);
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>

</body>

</html>
